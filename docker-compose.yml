services:
  postgres:
    image: postgres:17
    container_name: scr_postgres
    environment:
      POSTGRES_USER: scr
      POSTGRES_PASSWORD: scr
      POSTGRES_DB: scr_radar
    ports:
      - "5433:5432"
    volumes:
      - scr_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scr -d scr_radar"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    container_name: scr_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  scr_pgdata:
